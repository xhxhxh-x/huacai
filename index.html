<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华才实验室之“超级配方失窃案”</title>
    <style>
        :root {
            --ink: #35241c;
            --paper: #eadfc9;
            --paper-deep: #d7c5a5;
            --wood: #5c4033;
            --gold: #d9b451;
            --danger: #8b2500;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: clamp(12px, 2vw, 24px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            color: var(--ink);
            background: #241d18;
            font-family: "Times New Roman", "SimSun", serif;
        }

        button {
            font: inherit;
        }

        .screen {
            display: none;
            position: relative;
            width: min(1000px, 100%);
            min-height: min(600px, calc(100vh - 32px));
            overflow: hidden;
            border: 8px solid var(--wood);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
        }

        .screen.active {
            display: flex;
        }

        .cover-screen {
            min-height: min(700px, calc(100vh - 32px));
            align-items: center;
            justify-content: center;
            background: #050403;
            text-align: center;
        }

        .cover-art {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-shade {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.72));
        }

        .cover-content {
            position: relative;
            z-index: 1;
            width: min(760px, calc(100% - 32px));
            color: #fff8e7;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.75);
        }

        .cover-title {
            margin: 0 0 14px;
            font-size: clamp(34px, 7vw, 72px);
            line-height: 1.12;
            letter-spacing: 0;
        }

        .cover-copy {
            margin: 0 0 28px;
            font-size: clamp(18px, 2.4vw, 26px);
        }

        .gold-btn,
        .submit-btn {
            min-height: 46px;
            border: 3px solid var(--ink);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .gold-btn {
            padding: 14px 46px;
            color: var(--ink);
            background: linear-gradient(180deg, #f1d172, #bc8d17);
            font-size: clamp(20px, 3vw, 30px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.38);
        }

        .submit-btn {
            padding: 12px 40px;
            color: var(--paper);
            background: var(--wood);
            border: 0;
            font-size: 20px;
        }

        .gold-btn:hover,
        .submit-btn:hover,
        .modal-btn:hover {
            filter: brightness(1.06);
        }

        .gold-btn:active,
        .submit-btn:active,
        .modal-btn:active {
            transform: scale(0.97);
        }

        .intro-screen {
            min-height: 600px;
            align-items: center;
            justify-content: center;
            background-color: #1b1512;
            background-image: linear-gradient(rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.3)), url("assets/desk-bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .deduction-screen {
            min-height: 600px;
            padding: 40px 40px 110px;
            flex-direction: row;
            gap: 30px;
            background-color: var(--paper);
            background-image: radial-gradient(circle, transparent 20%, var(--paper-deep) 100%);
        }

        .left-panel {
            flex: 6;
            padding-right: 30px;
            border-right: 2px dashed #8b7355;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--ink);
            font-size: 20px;
            line-height: 2;
        }

        .left-panel p {
            margin: 0 0 16px;
        }

        .left-panel p:last-child {
            margin-bottom: 0;
        }

        .right-panel {
            flex: 4;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 14px;
        }

        .bottom-bar {
            position: absolute;
            left: 0;
            bottom: 28px;
            width: 100%;
            text-align: center;
        }

        .blank {
            display: inline-block;
            min-width: 118px;
            margin: 0 5px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--wood);
            color: var(--danger);
            cursor: pointer;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            vertical-align: bottom;
        }

        .option-btn {
            min-height: 42px;
            padding: 9px 14px;
            border: 2px solid #8b7355;
            border-radius: 5px;
            color: var(--ink);
            background-color: #f7efe2;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
        }

        .option-btn.grayed {
            color: #777;
            background-color: #ccc;
            border-color: #999;
            box-shadow: none;
            cursor: not-allowed;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            width: min(420px, 100%);
            padding: 30px;
            border: 5px solid var(--wood);
            border-radius: 4px;
            text-align: center;
            background-color: var(--paper);
            background-image: radial-gradient(circle, transparent 20%, var(--paper-deep) 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-body {
            margin-bottom: 24px;
            color: var(--ink);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
        }

        .modal-btn {
            min-height: 42px;
            padding: 10px 30px;
            border: 0;
            border-radius: 4px;
            color: var(--paper);
            background-color: var(--wood);
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 760px) {
            body {
                align-items: stretch;
                padding: 0;
            }

            .screen {
                width: 100%;
                min-height: 100vh;
                border: 0;
                box-shadow: none;
            }

            .cover-screen,
            .intro-screen {
                min-height: 100vh;
            }

            .deduction-screen {
                min-height: 100vh;
                padding: 20px 20px 96px;
                flex-direction: column;
                gap: 18px;
                overflow: auto;
            }

            .left-panel {
                display: block;
                flex: none;
                padding-right: 0;
                padding-bottom: 18px;
                border-right: 0;
                border-bottom: 2px dashed #8b7355;
                font-size: 16px;
                line-height: 1.75;
            }

            .right-panel {
                flex: none;
                gap: 10px;
            }

            .blank {
                min-width: 82px;
                margin: 0 3px;
                padding-bottom: 5px;
            }

            .option-btn {
                flex: 1 1 calc(50% - 10px);
                padding: 9px 10px;
                font-size: 15px;
            }

            .bottom-bar {
                position: sticky;
                bottom: -1px;
                margin: 8px -20px -96px;
                padding: 14px 20px 20px;
                width: auto;
                background: linear-gradient(180deg, rgba(234, 223, 201, 0), rgba(234, 223, 201, 0.96) 28%, rgba(234, 223, 201, 1));
            }

            .submit-btn {
                width: min(280px, 100%);
            }
        }

        @media (max-width: 430px) {
            .cover-content {
                width: min(340px, calc(100% - 28px));
            }

            .cover-title {
                font-size: 34px;
            }

            .option-btn {
                flex-basis: 100%;
            }
        }
    </style>
</head>
<body>
    <main id="game-root">
        <section id="cover-page" class="screen cover-screen active" aria-label="游戏入口">
            <img class="cover-art" src="assets/cover.jpg" alt="华才实验室封面">
            <div class="cover-shade" aria-hidden="true"></div>
            <div class="cover-content">
                <h1 class="cover-title">华才实验室之<br>“超级配方失窃案”</h1>
                <p class="cover-copy">进入现场，找出真正的窃贼。</p>
                <button class="gold-btn" id="enter-btn" type="button">进入游戏</button>
            </div>
        </section>

        <section id="screen1" class="screen intro-screen" aria-label="案件开始">
            <button class="gold-btn" id="start-btn" type="button">开始探案</button>
        </section>

        <section id="screen2" class="screen deduction-screen" aria-label="第一轮推理">
            <div class="left-panel">
                <p>证据A中的白色粉末遇碘伏变成了 <span class="blank" data-id="s2-b1"></span>，这证明它是 <span class="blank" data-id="s2-b2"></span>。这与嫌疑人 <span class="blank" data-id="s2-b3"></span> 最近研究的植物淀粉提取技术完全吻合。</p>
                <p>证据B是看似空白的便条，用 <span class="blank" data-id="s2-b4"></span> 喷洒后，显现出文字，这说明写便条的人用了 <span class="blank" data-id="s2-b5"></span> 写隐形字。习惯在办公桌上放柠檬的正是 <span class="blank" data-id="s2-b6"></span>。</p>
                <p>证据C为在保险柜把手上检测到的液体，滴入紫甘蓝汁后变成了 <span class="blank" data-id="s2-b7"></span>，说明该液体呈 <span class="blank" data-id="s2-b8"></span>，而昨天刚打翻过紫甘蓝汁的是 <span class="blank" data-id="s2-b9"></span>。</p>
            </div>
            <div class="right-panel" id="options2"></div>
            <div class="bottom-bar">
                <button class="submit-btn" id="submit2" type="button">完成推理</button>
            </div>
        </section>

        <section id="screen3" class="screen deduction-screen" aria-label="最终推理">
            <div class="left-panel">
                <p>因此，我们认定本案是 <span class="blank" data-id="s3-b1"></span>。</p>
                <p>真正的窃贼是 <span class="blank" data-id="s3-b2"></span> 和 <span class="blank" data-id="s3-b3"></span>！</p>
            </div>
            <div class="right-panel" id="options3"></div>
            <div class="bottom-bar">
                <button class="submit-btn" id="submit3" type="button">完成推理</button>
            </div>
        </section>
    </main>

    <div id="custom-alert" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-message">
        <div class="modal-content">
            <div class="modal-body" id="modal-message"></div>
            <button class="modal-btn" id="modal-confirm" type="button">确认</button>
        </div>
    </div>

    <script>
        const caseData = {
            screen2: {
                options: ["蓝色", "紫色", "淀粉", "莫教授", "碘伏水", "柠檬汁", "椰子水", "小李研究员", "红色", "碱性", "酸性", "小王实习生"],
                correctAnswers: ["蓝色", "淀粉", "莫教授", "碘伏水", "柠檬汁", "小李研究员", "红色", "酸性", "小王实习生"]
            },
            screen3: {
                options: ["一人单独作案", "两人团伙作案", "三人共同作案", "莫教授", "小李研究员", "小王实习生"],
                correctAnswers: ["两人团伙作案"],
                thiefGroup: ["莫教授", "小李研究员"]
            }
        };

        let currentModalCallback = null;

        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach((screen) => {
                screen.classList.toggle("active", screen.id === screenId);
            });
        }

        function showModal(message, callback, buttonText = "确认") {
            const modal = document.getElementById("custom-alert");
            document.getElementById("modal-message").innerText = message;
            document.getElementById("modal-confirm").innerText = buttonText;
            currentModalCallback = callback;
            modal.classList.add("open");
        }

        function closeModal() {
            document.getElementById("custom-alert").classList.remove("open");
            const callback = currentModalCallback;
            currentModalCallback = null;
            if (typeof callback === "function") {
                callback();
            }
        }

        function initDeductionLogic(screenId, data, isFinalScreen) {
            const screen = document.getElementById(screenId);
            const optionsContainer = screen.querySelector(".right-panel");
            const blanks = Array.from(screen.querySelectorAll(".blank"));
            const submitBtn = screen.querySelector(".submit-btn");

            data.options.forEach((optText, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = optText;
                btn.id = `${screenId}-opt-${index}`;
                btn.type = "button";

                btn.addEventListener("click", () => {
                    if (btn.classList.contains("grayed")) {
                        return;
                    }

                    const firstEmptyBlank = blanks.find((blank) => !blank.dataset.value);
                    if (firstEmptyBlank) {
                        firstEmptyBlank.textContent = optText;
                        firstEmptyBlank.dataset.value = optText;
                        firstEmptyBlank.dataset.sourceBtnId = btn.id;
                        btn.classList.add("grayed");
                    }
                });

                optionsContainer.appendChild(btn);
            });

            blanks.forEach((blank) => {
                blank.addEventListener("click", () => {
                    if (!blank.dataset.value) {
                        return;
                    }

                    const sourceBtn = document.getElementById(blank.dataset.sourceBtnId);
                    if (sourceBtn) {
                        sourceBtn.classList.remove("grayed");
                    }

                    blank.textContent = "";
                    delete blank.dataset.value;
                    delete blank.dataset.sourceBtnId;
                });
            });

            submitBtn.addEventListener("click", () => {
                if (!blanks.every((blank) => blank.dataset.value)) {
                    showModal("请填满所有线索后再进行推理！");
                    return;
                }

                let isCorrect;
                if (!isFinalScreen) {
                    isCorrect = blanks.every((blank, index) => blank.dataset.value === data.correctAnswers[index]);
                } else {
                    const userThieves = [blanks[1].dataset.value, blanks[2].dataset.value];
                    isCorrect = blanks[0].dataset.value === data.correctAnswers[0]
                        && data.thiefGroup.every((thief) => userThieves.includes(thief))
                        && new Set(userThieves).size === data.thiefGroup.length;
                }

                if (!isCorrect) {
                    showModal("很遗憾，您的推理需要再完善。");
                    return;
                }

                if (isFinalScreen) {
                    showModal("恭喜这位侦探，全部推理正确，破案成功！", () => {
                        window.location.reload();
                    }, "再次推理");
                } else {
                    showModal("第一轮推理正确，继续锁定嫌疑人。", () => {
                        showScreen("screen3");
                    });
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("enter-btn").addEventListener("click", () => showScreen("screen1"));
            document.getElementById("start-btn").addEventListener("click", () => showScreen("screen2"));
            document.getElementById("modal-confirm").addEventListener("click", closeModal);
            initDeductionLogic("screen2", caseData.screen2, false);
            initDeductionLogic("screen3", caseData.screen3, true);
        });
    </script>
</body>
</html>
